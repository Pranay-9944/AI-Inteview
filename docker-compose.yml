version: '3.8'

services:

  # ── MySQL Database ──────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: interview-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ROOT
      MYSQL_DATABASE: interview
    ports:
           - "3307:3306"    
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Flask AI Service ────────────────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: interview-ai
    restart: always
    ports:
      - "5000:5000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - db

  # ── Spring Boot Backend ─────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: interview-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/interview
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=ROOT
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_started
    volumes:
      - uploads:/app/uploads

  # ── React Frontend ──────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: interview-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db-data:
  uploads: